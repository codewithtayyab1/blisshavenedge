<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Base SEO (overridden per-page by useSEO hook) -->
    <meta name="description" content="Bliss Haven Edge — Premium men's salon in Wah Cantt. Expert haircuts, beard styling, facials, hair treatments and more. Open daily 10:30 AM – 1:00 AM." />
    <meta name="keywords" content="men's salon Wah Cantt, barber Wah Cantt, haircut Wah Cantt, beard styling, facials, hair treatment, Bliss Haven Edge, grooming Wah Cantt" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (social sharing) -->
    <meta property="og:site_name" content="Bliss Haven Edge" />
    <meta property="og:type"      content="website" />
    <meta property="og:image"     content="/images/logo.jpeg" />
    <meta property="og:locale"    content="en_PK" />

    <!-- Preload hero background image — browser fetches it before CSS is parsed -->
    <link rel="preload" as="image" href="/images/interior-1.jpeg" fetchpriority="high" />

    <!-- Favicon using logo -->
    <link rel="icon" type="image/jpeg" href="/images/logo.jpeg" />
    <link rel="apple-touch-icon"       href="/images/logo.jpeg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>Bliss Haven Edge — Premium Men's Salon in Wah Cantt</title>

    <!-- LocalBusiness structured data (JSON-LD) — helps Google show rich salon listing -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HairSalon",
      "name": "Bliss Haven Edge",
      "url": "https://blisshavenedge.com",
      "telephone": "+923039228634",
      "email": "alihassantiktok13@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "CB Shop No 2, Near Super Sweet Bakers, Laiq Ali Chowk",
        "addressLocality": "Wah Cantt",
        "addressRegion": "Punjab",
        "addressCountry": "PK"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
          "opens": "10:30",
          "closes": "25:00"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "bestRating": "5",
        "reviewCount": "50"
      },
      "image": "/images/logo.jpeg",
      "priceRange": "Rs. 800 – Rs. 10,000",
      "currenciesAccepted": "PKR",
      "paymentAccepted": "Cash, Easypaisa, JazzCash",
      "description": "Premium men's grooming salon in Wah Cantt. Expert haircuts, beard styling, facials, hair treatments, colour, and massage. Open daily."
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
